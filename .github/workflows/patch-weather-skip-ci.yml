name: Patch weather deployment trigger

on:
  push:
    paths:
      - '.github/workflows/patch-weather-skip-ci.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prevent intermediate Pages deployment
        run: |
          python - <<'PY'
          from pathlib import Path

          target = Path('.github/workflows/update-weather-live.yml')
          text = target.read_text(encoding='utf-8')
          old = 'git commit -m "Update live weather data"'
          new = 'git commit -m "Update live weather data [skip ci]"'
          if old not in text and new not in text:
              raise RuntimeError('更新対象のコミット行が見つかりません。')
          if old in text:
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          Path('.github/workflows/patch-weather-skip-ci.yml').unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/update-weather-live.yml .github/workflows/patch-weather-skip-ci.yml
          git commit -m "Avoid intermediate weather Pages deployment"
          git push
