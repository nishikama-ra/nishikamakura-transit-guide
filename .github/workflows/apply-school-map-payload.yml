name: Apply school map payload

on:
  push:
    branches:
      - agent/school-map-current-data-20260720
    paths:
      - '.release-payload/**'
      - '.github/workflows/apply-school-map-payload.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify, apply, and validate payload
        shell: bash
        run: |
          set -euo pipefail
          cat .release-payload/part-*.txt | base64 --decode > /tmp/guide_payload.tar.gz
          echo '0fb82d7bb909c9828172b3d5ba357bfa121616cb116be42b0db415ff5dfc72e9  /tmp/guide_payload.tar.gz' | sha256sum -c -
          tar -xzf /tmp/guide_payload.tar.gz -C .
          node --check scripts/school-map-mockup.js
          node --check tools/build-school-map-data.mjs
          python3 - <<'PY'
          import collections
          import json
          from pathlib import Path

          base = Path('content')
          manifest = json.loads((base / 'schools.json').read_text(encoding='utf-8'))
          expected_files = ['schools-01.json', 'schools-02.json', 'schools-03.json', 'schools-04.json']
          assert manifest['files'] == expected_files
          campuses = []
          shard_counts = []
          for name in expected_files:
              shard = json.loads((base / name).read_text(encoding='utf-8'))
              shard_counts.append(len(shard['campuses']))
              campuses.extend(shard['campuses'])
          institution_ids = []
          counts = collections.Counter()
          for campus in campuses:
              for listing in campus['listings']:
                  ids = listing['institutionIds']
                  institution_ids.extend(ids)
                  for school_type in listing['types']:
                      counts[school_type] += len(ids)
          assert shard_counts == [50, 50, 50, 48], shard_counts
          assert len(campuses) == 198, len(campuses)
          assert len(institution_ids) == 268, len(institution_ids)
          assert len(set(institution_ids)) == 268
          assert dict(counts) == {'high': 150, 'juniorHigh': 52, 'university': 45, 'elementary': 22}, dict(counts)
          assert manifest['meta']['institutionCount'] == 268
          assert manifest['meta']['campusCount'] == 198
          print('PASS: 268 institutions, 198 campuses, shards 50+50+50+48')
          PY
      - name: Commit validated files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .release-payload
          rm -f .github/workflows/apply-school-map-payload.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Publish corrected school map data [skip ci]'
          git push
