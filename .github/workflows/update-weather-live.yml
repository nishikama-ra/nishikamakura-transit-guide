name: Update live weather data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-weather-live.yml'
  schedule:
    - cron: '7 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build weather data
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)

          def fetch_text(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'nishikamakura-transit-guide/1.0'})
              with urllib.request.urlopen(req, timeout=30) as response:
                  return response.read().decode('utf-8-sig', errors='replace')

          def fetch_json(url):
              return json.loads(fetch_text(url))

          def parse_iso(value):
              try:
                  return datetime.fromisoformat(value)
              except Exception:
                  return None

          def parse_wbgt(text):
              rows = list(csv.reader(io.StringIO(text)))
              targets = [(now + timedelta(days=i)).date() for i in range(3)]
              maxima = {day: None for day in targets}
              if len(rows) < 2:
                  return []
              header = rows[0]
              values = rows[1]
              for i in range(2, min(len(header), len(values))):
                  stamp = header[i].strip()
                  raw = values[i].strip()
                  try:
                      dt = datetime.strptime(stamp, '%Y%m%d%H').replace(tzinfo=JST)
                      value = float(raw) / 10.0
                  except ValueError:
                      continue
                  day = dt.date()
                  if day not in maxima:
                      continue
                  maxima[day] = value if maxima[day] is None else max(maxima[day], value)
              labels = ['今日', '明日', '明後日']
              return [
                  {'label': labels[i], 'date': day.isoformat(), 'max': maxima[day]}
                  for i, day in enumerate(targets)
              ]

          def phenomenon_name(type_name):
              text = str(type_name)
              if '雨' in text:
                  return '大雨'
              if '雪' in text:
                  return '大雪'
              if '風' in text:
                  return '暴風・暴風雪'
              if '波' in text:
                  return '高波'
              if '潮位' in text:
                  return '高潮'
              return text.replace('の警報級の可能性', '')

          def format_period(value):
              dt = parse_iso(value)
              if not dt:
                  return str(value)
              return f'{dt.month}/{dt.day} {dt.hour:02d}時～'

          def extract_early(data):
              if not isinstance(data, list):
                  return '', []
              reports = [item for item in data if isinstance(item, dict) and item.get('reportDatetime')]
              if not reports:
                  return '', []
              latest_report = max(reports, key=lambda item: item['reportDatetime'])
              report_dt = parse_iso(latest_report['reportDatetime'])
              if not report_dt or now - report_dt.astimezone(JST) > timedelta(hours=18):
                  return latest_report['reportDatetime'], []

              items = []
              seen = set()
              for report in reports:
                  if report.get('reportDatetime') != latest_report['reportDatetime']:
                      continue
                  for series in report.get('timeSeries', []):
                      times = series.get('timeDefines', [])
                      for area in series.get('areas', []):
                          if str(area.get('code')) not in ('140010', '140000'):
                              continue
                          for prop in area.get('properties', []):
                              probabilities = prop.get('probabilities')
                              if not isinstance(probabilities, list):
                                  continue
                              phenomenon = phenomenon_name(prop.get('type', ''))
                              for index, level in enumerate(probabilities):
                                  if level not in ('高', '中'):
                                      continue
                                  period = format_period(times[index]) if index < len(times) else ''
                                  key = (phenomenon, level, period)
                                  if key in seen:
                                      continue
                                  seen.add(key)
                                  items.append({'phenomenon': phenomenon, 'level': level, 'period': period})
              items.sort(key=lambda item: (0 if item['level'] == '高' else 1, item['period'], item['phenomenon']))
              return latest_report['reportDatetime'], items

          result = {
              'updatedAt': now.isoformat(timespec='minutes'),
              'wbgt': {'updatedAt': '', 'days': []},
              'earlyWarnings': {'reportDatetime': '', 'items': []}
          }

          try:
              wbgt_text = fetch_text('http://www.wbgt.env.go.jp/prev15WG/dl/yohou_46141.csv')
              result['wbgt'] = {
                  'updatedAt': now.isoformat(timespec='minutes'),
                  'days': parse_wbgt(wbgt_text)
              }
          except Exception as exc:
              print(f'WBGT fetch failed: {exc}')

          try:
              early_data = fetch_json('https://www.jma.go.jp/bosai/probability/data/probability/140000.json')
              report, items = extract_early(early_data)
              result['earlyWarnings'] = {'reportDatetime': report, 'items': items}
          except Exception as exc:
              print(f'Early warning fetch failed: {exc}')

          Path('content/weather-live.json').write_text(json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          html_path = Path('weather-top-mockup.html')
          html = html_path.read_text(encoding='utf-8')
          if 'scripts/weather-live.js' not in html:
              html = html.replace('</body>', '<script src="scripts/weather-live.js?v=20260722-21"></script>\n</body>')
          else:
              import re
              html = re.sub(r'scripts/weather-live\.js(?:\?v=[^"\']*)?', 'scripts/weather-live.js?v=20260722-21', html)
          html_path.write_text(html, encoding='utf-8')
          PY

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/weather-live.json weather-top-mockup.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update live weather data"
          git push
