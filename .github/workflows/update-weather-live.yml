name: Update live weather data

on:
  workflow_dispatch:
  schedule:
    - cron: '7 * * * *'

permissions:
  contents: write

concurrency:
  group: update-live-weather
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build weather data
        run: python scripts/update_weather_live.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/weather-live.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update live weather data"
          git push
