name: Update live weather data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-weather-live.yml'
  schedule:
    - cron: '7 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build weather data
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import re
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)

          def fetch_text(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'nishikamakura-transit-guide/1.0'})
              with urllib.request.urlopen(req, timeout=30) as response:
                  return response.read().decode('utf-8-sig', errors='replace')

          def fetch_json(url):
              return json.loads(fetch_text(url))

          def parse_date(value):
              s = str(value).strip()
              for pattern in ('%Y%m%d', '%Y/%m/%d', '%Y-%m-%d', '%Y%m%d%H', '%Y/%m/%d %H'):
                  try:
                      return datetime.strptime(s, pattern).replace(tzinfo=JST)
                  except ValueError:
                      pass
              m = re.search(r'(20\d{2})[/-]?(\d{1,2})[/-]?(\d{1,2})', s)
              if m:
                  return datetime(int(m.group(1)), int(m.group(2)), int(m.group(3)), tzinfo=JST)
              return None

          def parse_wbgt(text):
              targets = [(now + timedelta(days=i)).date() for i in range(3)]
              maxima = {d: None for d in targets}
              for row in csv.reader(io.StringIO(text)):
                  if not row:
                      continue
                  joined = ' '.join(row)
                  dt = parse_date(joined)
                  if not dt or dt.date() not in maxima:
                      continue
                  nums = []
                  for cell in row:
                      try:
                          value = float(str(cell).strip())
                      except ValueError:
                          continue
                      if 0 <= value <= 60:
                          nums.append(value)
                  if not nums:
                      continue
                  value = max(nums)
                  maxima[dt.date()] = value if maxima[dt.date()] is None else max(maxima[dt.date()], value)
              labels = ['今日', '明日', '明後日']
              return [
                  {'label': labels[i], 'date': day.isoformat(), 'max': maxima[day]}
                  for i, day in enumerate(targets)
              ]

          phenomena = ['大雨', '土砂災害', '雪', '風', '波', '潮位']

          def normalize_period(value):
              if isinstance(value, str):
                  return value.replace('T', ' ').replace('+09:00', '')
              return ''

          def extract_early(data):
              report = ''
              if isinstance(data, dict):
                  report = data.get('reportDatetime', '')
              elif isinstance(data, list):
                  for item in data:
                      if isinstance(item, dict) and item.get('reportDatetime'):
                          report = item['reportDatetime']
                          break

              found = []
              seen = set()

              def walk(node, area_ok=False, time_defs=None, phenomenon=None):
                  if isinstance(node, dict):
                      area = node.get('area') if isinstance(node.get('area'), dict) else None
                      code = str(node.get('code') or (area or {}).get('code') or '')
                      name = str(node.get('name') or (area or {}).get('name') or '')
                      local_area_ok = area_ok or code == '140010' or '神奈川県東部' in name or name == '東部'
                      local_times = node.get('timeDefines') if isinstance(node.get('timeDefines'), list) else time_defs
                      local_phenomenon = phenomenon
                      for key in ('type', 'propertyType', 'phenomenon', 'name'):
                          value = node.get(key)
                          if isinstance(value, str):
                              for p in phenomena:
                                  if p in value:
                                      local_phenomenon = p
                                      break
                      for key, value in node.items():
                          if local_area_ok and isinstance(value, list) and value and all(isinstance(v, str) for v in value):
                              if any(v in ('高', '中') for v in value):
                                  p = local_phenomenon or next((x for x in phenomena if x in key), '現象')
                                  for i, level in enumerate(value):
                                      if level not in ('高', '中'):
                                          continue
                                      period = ''
                                      if local_times and i < len(local_times):
                                          period = normalize_period(local_times[i])
                                      item = (p, level, period)
                                      if item not in seen:
                                          seen.add(item)
                                          found.append({'phenomenon': p, 'level': level, 'period': period})
                          walk(value, local_area_ok, local_times, local_phenomenon)
                  elif isinstance(node, list):
                      for value in node:
                          walk(value, area_ok, time_defs, phenomenon)

              walk(data)
              found.sort(key=lambda x: (0 if x['level'] == '高' else 1, x['period'], x['phenomenon']))
              return report, found

          result = {
              'updatedAt': now.isoformat(timespec='minutes'),
              'wbgt': {'updatedAt': '', 'days': []},
              'earlyWarnings': {'reportDatetime': '', 'items': []}
          }

          try:
              wbgt_text = fetch_text('http://www.wbgt.env.go.jp/prev15WG/dl/yohou_46141.csv')
              result['wbgt'] = {
                  'updatedAt': now.isoformat(timespec='minutes'),
                  'days': parse_wbgt(wbgt_text)
              }
          except Exception as exc:
              print(f'WBGT fetch failed: {exc}')

          try:
              early_data = fetch_json('https://www.jma.go.jp/bosai/probability/data/probability/140000.json')
              report, items = extract_early(early_data)
              result['earlyWarnings'] = {'reportDatetime': report, 'items': items}
          except Exception as exc:
              print(f'Early warning fetch failed: {exc}')

          Path('content/weather-live.json').write_text(json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          html_path = Path('weather-top-mockup.html')
          html = html_path.read_text(encoding='utf-8')
          if 'scripts/weather-live.js' not in html:
              html = html.replace('</body>', '<script src="scripts/weather-live.js?v=20260722-20"></script>\n</body>')
          else:
              html = re.sub(r'scripts/weather-live\.js(?:\?v=[^"\']*)?', 'scripts/weather-live.js?v=20260722-20', html)
          html_path.write_text(html, encoding='utf-8')
          PY

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/weather-live.json weather-top-mockup.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update live weather data"
          git push
