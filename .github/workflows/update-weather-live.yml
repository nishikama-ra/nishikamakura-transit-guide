name: Update live weather data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-weather-live.yml'
  schedule:
    - cron: '7 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build weather data
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import re
          import urllib.request
          from urllib.parse import urljoin
          import xml.etree.ElementTree as ET
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          FEED_URL = 'https://www.data.jma.go.jp/developer/xml/feed/regular_l.xml'
          FORECAST_URL = 'https://www.jma.go.jp/bosai/forecast/data/forecast/140000.json'
          AREA_NEAR = ('140010', '140000')
          AREA_FAR = ('140000',)
          TEMPERATURE_AREA_CODE = '46106'
          TEMPERATURE_AREA_NAME = '横浜'
          data_path = Path('content/weather-live.json')

          def fetch_text(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      'User-Agent': 'nishikamakura-transit-guide/1.0',
                      'Cache-Control': 'no-cache',
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  return response.read().decode('utf-8-sig', errors='replace')

          def fetch_json(url):
              return json.loads(fetch_text(url))

          def parse_iso(value):
              try:
                  return datetime.fromisoformat(value)
              except Exception:
                  return None

          def finite_number(value):
              try:
                  number = float(value)
              except (TypeError, ValueError):
                  return None
              return number if number == number and abs(number) != float('inf') else None

          def local_name(tag):
              return tag.rsplit('}', 1)[-1]

          def child_text(parent, name):
              if parent is None:
                  return ''
              for child in parent:
                  if local_name(child.tag) == name:
                      return (child.text or '').strip()
              return ''

          def descendants(parent, name):
              return [node for node in parent.iter() if local_name(node.tag) == name]

          def parse_duration(value):
              match = re.fullmatch(r'P(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?)?', value or '')
              if not match:
                  return timedelta(0)
              days, hours, minutes = (int(part or 0) for part in match.groups())
              return timedelta(days=days, hours=hours, minutes=minutes)

          def format_range(start, end):
              display_end = end
              end_hour = end.hour
              if end > start and end.hour == 0 and end.minute == 0:
                  display_end = end - timedelta(days=1)
                  end_hour = 24
              if display_end.date() == start.date():
                  return f'{start.month}/{start.day} {start.hour:02d}時～{end_hour:02d}時'
              return f'{start.month}/{start.day} {start.hour:02d}時～{display_end.month}/{display_end.day} {end_hour:02d}時'

          def format_period(start_value, duration_value):
              start = parse_iso(start_value)
              if not start:
                  return start_value or ''
              start = start.astimezone(JST)
              duration = parse_duration(duration_value)
              end = start + duration
              if duration == timedelta(days=1) and start.hour == 0:
                  return f'{start.month}/{start.day}'
              return format_range(start, end)

          def parse_wbgt(text):
              rows = list(csv.reader(io.StringIO(text)))
              targets = [(now + timedelta(days=i)).date() for i in range(3)]
              maxima = {day: None for day in targets}
              if len(rows) < 2:
                  return []
              header = rows[0]
              values = rows[1]
              for i in range(2, min(len(header), len(values))):
                  stamp = header[i].strip()
                  raw = values[i].strip()
                  try:
                      dt = datetime.strptime(stamp, '%Y%m%d%H').replace(tzinfo=JST)
                      value = float(raw) / 10.0
                  except ValueError:
                      continue
                  day = dt.date()
                  if day not in maxima:
                      continue
                  maxima[day] = value if maxima[day] is None else max(maxima[day], value)
              labels = ['今日', '明日', '明後日']
              return [
                  {'label': labels[i], 'date': day.isoformat(), 'max': maxima[day]}
                  for i, day in enumerate(targets)
              ]

          def feed_entries(feed_text, product_code):
              root = ET.fromstring(feed_text)
              entries = []
              for entry in descendants(root, 'entry'):
                  href = ''
                  for link in entry:
                      if local_name(link.tag) == 'link' and link.attrib.get('href'):
                          href = link.attrib['href']
                          if product_code in href:
                              break
                  if not href or product_code not in href:
                      continue
                  entries.append({
                      'href': urljoin(FEED_URL, href),
                      'updated': child_text(entry, 'updated'),
                      'content': child_text(entry, 'content'),
                      'title': child_text(entry, 'title'),
                  })
              entries.sort(key=lambda item: item['updated'], reverse=True)
              preferred = [
                  item for item in entries
                  if '横浜地方気象台' in item['content']
                  or re.search(r'_140000\.xml(?:$|\?)', item['href'])
              ]
              return preferred or entries

          def is_kanagawa_report(root):
              status = next(((node.text or '').strip() for node in descendants(root, 'Status') if (node.text or '').strip()), '')
              if status and status != '通常':
                  return False
              offices = ' '.join((node.text or '').strip() for node in descendants(root, 'PublishingOffice'))
              titles = ' '.join((node.text or '').strip() for node in descendants(root, 'Title'))
              codes = {(node.text or '').strip() for node in descendants(root, 'Code')}
              return (
                  '横浜地方気象台' in offices
                  or '神奈川県' in titles
                  or bool(codes.intersection({'140000', '140010', '140020'}))
              )

          def latest_report(feed_text, product_code):
              errors = []
              for entry in feed_entries(feed_text, product_code)[:80]:
                  try:
                      xml_text = fetch_text(entry['href'])
                      root = ET.fromstring(xml_text)
                  except Exception as exc:
                      errors.append(f"{entry['href']}: {exc}")
                      continue
                  if is_kanagawa_report(root):
                      return root, entry['href']
              detail = '; '.join(errors[:3])
              raise RuntimeError(f'{product_code} の神奈川県電文が見つかりません。{detail}')

          def report_history(feed_text, product_code, limit=12):
              reports = []
              for entry in feed_entries(feed_text, product_code)[:60]:
                  try:
                      root = ET.fromstring(fetch_text(entry['href']))
                  except Exception as exc:
                      print(f"{product_code} history fetch failed: {entry['href']}: {exc}")
                      continue
                  if not is_kanagawa_report(root):
                      continue
                  reports.append((root, entry['href']))
                  if len(reports) >= limit:
                      break
              return reports

          def report_datetime(root):
              values = [(node.text or '').strip() for node in descendants(root, 'ReportDateTime')]
              return next((value for value in values if value), '')

          def phenomenon_name(type_name):
              text = str(type_name)
              if '土砂' in text:
                  return '土砂災害'
              if '大雨' in text or '雨' in text:
                  return '大雨'
              if '雪' in text:
                  return '大雪'
              if '風' in text:
                  return '暴風・暴風雪'
              if '波' in text:
                  return '高波'
              if '潮位' in text:
                  return '高潮'
              return text.replace('の警報級の可能性', '')

          def direct_area_code(item):
              for child in item:
                  if local_name(child.tag) != 'Area':
                      continue
                  return child_text(child, 'Code'), child_text(child, 'Name')
              return '', ''

          def direct_station_code(item):
              for child in item:
                  if local_name(child.tag) not in ('Station', 'Area'):
                      continue
                  return child_text(child, 'Code'), child_text(child, 'Name')
              return '', ''

          def extract_report_items(root, accepted_codes, source_code):
              rows = []
              all_codes = {direct_area_code(item)[0] for item in descendants(root, 'Item')}
              target_code = next((code for code in accepted_codes if code in all_codes), '')
              if not target_code:
                  return rows
              for series in descendants(root, 'TimeSeriesInfo'):
                  times = {}
                  for time_define in descendants(series, 'TimeDefine'):
                      time_id = time_define.attrib.get('timeId', '')
                      times[time_id] = {
                          'start': child_text(time_define, 'DateTime'),
                          'duration': child_text(time_define, 'Duration'),
                          'name': child_text(time_define, 'Name'),
                      }
                  for item in descendants(series, 'Item'):
                      area_code, area_name = direct_area_code(item)
                      if area_code != target_code:
                          continue
                      for prop in descendants(item, 'Property'):
                          type_name = child_text(prop, 'Type')
                          if '警報級の可能性' not in type_name:
                              continue
                          phenomenon = phenomenon_name(type_name)
                          for rank in descendants(prop, 'PossibilityRankOfWarning'):
                              level = (rank.text or '').strip()
                              if level not in ('高', '中'):
                                  continue
                              ref_id = rank.attrib.get('refID', '')
                              period_info = times.get(ref_id, {})
                              rows.append({
                                  'phenomenon': phenomenon,
                                  'level': level,
                                  'start': period_info.get('start', ''),
                                  'duration': period_info.get('duration', ''),
                                  'period': format_period(
                                      period_info.get('start', ''),
                                      period_info.get('duration', ''),
                                  ),
                                  'areaCode': area_code,
                                  'areaName': area_name,
                                  'sourceCode': source_code,
                              })
              return rows

          def merge_contiguous(rows):
              normalized = []
              for row in rows:
                  start = parse_iso(row.get('start', ''))
                  duration = parse_duration(row.get('duration', ''))
                  if not start or not duration:
                      normalized.append(row)
                      continue
                  item = dict(row)
                  item['_start'] = start.astimezone(JST)
                  item['_end'] = (start + duration).astimezone(JST)
                  normalized.append(item)

              normalized.sort(key=lambda item: (
                  0 if item['level'] == '高' else 1,
                  item['phenomenon'],
                  item.get('_start') or datetime.max.replace(tzinfo=JST),
              ))
              merged = []
              for item in normalized:
                  if '_start' not in item:
                      merged.append(item)
                      continue
                  previous = merged[-1] if merged else None
                  same = previous and all(previous.get(key) == item.get(key) for key in (
                      'phenomenon', 'level', 'areaCode', 'sourceCode'
                  ))
                  if same and previous.get('_end') == item['_start']:
                      previous['_end'] = item['_end']
                      continue
                  merged.append(item)

              result = []
              for item in merged:
                  cleaned = {key: value for key, value in item.items() if not key.startswith('_') and key not in ('start', 'duration')}
                  if '_start' in item:
                      start = item['_start']
                      end = item['_end']
                      duration = end - start
                      if duration == timedelta(days=1) and start.hour == 0:
                          cleaned['period'] = f'{start.month}/{start.day}'
                      else:
                          cleaned['period'] = format_range(start, end)
                  result.append(cleaned)
              result.sort(key=lambda item: (
                  0 if item['level'] == '高' else 1,
                  item.get('period', ''),
                  item['phenomenon'],
              ))
              return result

          def load_previous_temperature_days():
              try:
                  previous = json.loads(data_path.read_text(encoding='utf-8'))
              except Exception:
                  return {}
              section = previous.get('temperatureForecasts', {})
              days = section.get('days', {}) if isinstance(section, dict) else {}
              keep_from = now.date()
              keep_until = keep_from + timedelta(days=8)
              kept = {}
              for date_key, values in days.items():
                  try:
                      day = datetime.strptime(date_key, '%Y-%m-%d').date()
                  except (TypeError, ValueError):
                      continue
                  if not keep_from <= day <= keep_until or not isinstance(values, dict):
                      continue
                  item = {}
                  for field in ('max', 'min'):
                      number = finite_number(values.get(field))
                      if number is not None:
                          item[field] = number
                          report_field = f'{field}ReportDatetime'
                          if values.get(report_field):
                              item[report_field] = values[report_field]
                  if item:
                      item['source'] = '気象庁'
                      item['areaName'] = values.get('areaName') or TEMPERATURE_AREA_NAME
                      kept[date_key] = item
              return kept

          def set_temperature_value(days, date_key, field, value, report_dt, overwrite=True):
              number = finite_number(value)
              if number is None or not date_key:
                  return
              item = days.setdefault(date_key, {'source': '気象庁', 'areaName': TEMPERATURE_AREA_NAME})
              if not overwrite and finite_number(item.get(field)) is not None:
                  return
              item[field] = number
              if report_dt:
                  item[f'{field}ReportDatetime'] = report_dt
              item['source'] = '気象庁'
              item['areaName'] = TEMPERATURE_AREA_NAME

          def extract_json_temperatures(forecast_data):
              extracted = {}
              if not isinstance(forecast_data, list) or not forecast_data:
                  return extracted
              short = forecast_data[0] if isinstance(forecast_data[0], dict) else {}
              short_report = short.get('reportDatetime', '')
              for series in short.get('timeSeries', []):
                  time_defines = series.get('timeDefines', [])
                  for area in series.get('areas', []):
                      if str(area.get('area', {}).get('code', '')) != TEMPERATURE_AREA_CODE:
                          continue
                      values = area.get('temps')
                      if not isinstance(values, list):
                          continue
                      for time_value, raw in zip(time_defines, values):
                          dt = parse_iso(time_value)
                          if not dt:
                              continue
                          dt = dt.astimezone(JST)
                          field = 'min' if dt.hour == 0 else 'max' if dt.hour == 9 else ''
                          if field:
                              set_temperature_value(extracted, dt.date().isoformat(), field, raw, short_report)

              if len(forecast_data) > 1 and isinstance(forecast_data[1], dict):
                  weekly = forecast_data[1]
                  weekly_report = weekly.get('reportDatetime', '')
                  for series in weekly.get('timeSeries', []):
                      time_defines = series.get('timeDefines', [])
                      for area in series.get('areas', []):
                          if str(area.get('area', {}).get('code', '')) != TEMPERATURE_AREA_CODE:
                              continue
                          for field, source_field in (('max', 'tempsMax'), ('min', 'tempsMin')):
                              values = area.get(source_field)
                              if not isinstance(values, list):
                                  continue
                              for time_value, raw in zip(time_defines, values):
                                  dt = parse_iso(time_value)
                                  if dt:
                                      set_temperature_value(
                                          extracted,
                                          dt.astimezone(JST).date().isoformat(),
                                          field,
                                          raw,
                                          weekly_report,
                                      )
              return extracted

          def extract_xml_temperatures(root):
              extracted = {}
              report_dt = report_datetime(root)
              for series in descendants(root, 'TimeSeriesInfo'):
                  times = {}
                  for time_define in descendants(series, 'TimeDefine'):
                      time_id = time_define.attrib.get('timeId', '')
                      times[time_id] = child_text(time_define, 'DateTime')
                  for item in descendants(series, 'Item'):
                      area_code, _ = direct_station_code(item)
                      if area_code != TEMPERATURE_AREA_CODE:
                          continue
                      for temperature in descendants(item, 'Temperature'):
                          type_name = temperature.attrib.get('type', '')
                          field = 'max' if '最高' in type_name else 'min' if '最低' in type_name else ''
                          ref_id = temperature.attrib.get('refID', '')
                          dt = parse_iso(times.get(ref_id, ''))
                          if not field or not dt:
                              continue
                          set_temperature_value(
                              extracted,
                              dt.astimezone(JST).date().isoformat(),
                              field,
                              (temperature.text or '').strip(),
                              report_dt,
                          )
              return extracted

          def merge_temperature_days(base, incoming, overwrite=True):
              for date_key, values in incoming.items():
                  for field in ('max', 'min'):
                      report_field = f'{field}ReportDatetime'
                      set_temperature_value(
                          base,
                          date_key,
                          field,
                          values.get(field),
                          values.get(report_field, ''),
                          overwrite=overwrite,
                      )

          temperature_days = load_previous_temperature_days()
          temperature_error = ''
          latest_temperature_report = ''
          feed_text = ''

          try:
              forecast_data = fetch_json(FORECAST_URL)
              current_temperatures = extract_json_temperatures(forecast_data)
              merge_temperature_days(temperature_days, current_temperatures, overwrite=True)
              report_values = [
                  values.get(field)
                  for values in current_temperatures.values()
                  for field in ('maxReportDatetime', 'minReportDatetime')
                  if values.get(field)
              ]
              if report_values:
                  latest_temperature_report = max(report_values)
          except Exception as exc:
              temperature_error = str(exc)
              print(f'Temperature forecast fetch failed: {exc}')

          try:
              feed_text = fetch_text(FEED_URL)
              for root, _ in report_history(feed_text, 'VPFD51', limit=6):
                  historical = extract_xml_temperatures(root)
                  merge_temperature_days(temperature_days, historical, overwrite=False)
          except Exception as exc:
              print(f'Temperature forecast history fetch failed: {exc}')
              if not temperature_error:
                  temperature_error = str(exc)

          keep_from = now.date()
          keep_until = keep_from + timedelta(days=8)
          temperature_days = {
              date_key: values
              for date_key, values in sorted(temperature_days.items())
              if keep_from <= datetime.strptime(date_key, '%Y-%m-%d').date() <= keep_until
          }
          all_temperature_reports = [
              values.get(field)
              for values in temperature_days.values()
              for field in ('maxReportDatetime', 'minReportDatetime')
              if values.get(field)
          ]
          if all_temperature_reports:
              latest_temperature_report = max(all_temperature_reports)

          result = {
              'updatedAt': now.isoformat(timespec='minutes'),
              'temperatureForecasts': {
                  'status': 'ok' if temperature_days else 'error',
                  'updatedAt': latest_temperature_report,
                  'areaCode': TEMPERATURE_AREA_CODE,
                  'areaName': TEMPERATURE_AREA_NAME,
                  'source': '気象庁',
                  'days': temperature_days,
              },
              'wbgt': {'status': 'error', 'updatedAt': '', 'days': []},
              'earlyWarnings': {
                  'status': 'error',
                  'reportDatetime': '',
                  'reports': {},
                  'items': [],
              },
          }
          if temperature_error:
              result['temperatureForecasts']['error'] = temperature_error

          try:
              wbgt_text = fetch_text('https://www.wbgt.env.go.jp/prev15WG/dl/yohou_46141.csv')
              result['wbgt'] = {
                  'status': 'ok',
                  'updatedAt': now.isoformat(timespec='minutes'),
                  'days': parse_wbgt(wbgt_text),
              }
          except Exception as exc:
              print(f'WBGT fetch failed: {exc}')

          try:
              if not feed_text:
                  feed_text = fetch_text(FEED_URL)
              near_root, near_url = latest_report(feed_text, 'VPFD61')
              near_dt = report_datetime(near_root)
              near_parsed = parse_iso(near_dt)
              if not near_parsed or now - near_parsed.astimezone(JST) > timedelta(hours=24):
                  raise RuntimeError(f'VPFD61 の発表時刻が古いか不明です: {near_dt}')

              rows = extract_report_items(near_root, AREA_NEAR, 'VPFD61')
              reports = {
                  'VPFD61': {'reportDatetime': near_dt, 'sourceUrl': near_url},
              }
              report_values = [near_dt]

              try:
                  far_root, far_url = latest_report(feed_text, 'VPFW60')
                  far_dt = report_datetime(far_root)
                  far_parsed = parse_iso(far_dt)
                  if not far_parsed or now - far_parsed.astimezone(JST) > timedelta(hours=36):
                      raise RuntimeError(f'VPFW60 の発表時刻が古いか不明です: {far_dt}')
                  rows.extend(extract_report_items(far_root, AREA_FAR, 'VPFW60'))
                  reports['VPFW60'] = {'reportDatetime': far_dt, 'sourceUrl': far_url}
                  report_values.append(far_dt)
              except Exception as exc:
                  print(f'Far-range early warning fetch failed: {exc}')
                  reports['VPFW60'] = {'status': 'error', 'error': str(exc)}

              result['earlyWarnings'] = {
                  'status': 'ok',
                  'reportDatetime': max(report_values),
                  'reports': reports,
                  'items': merge_contiguous(rows),
              }
          except Exception as exc:
              print(f'Early warning fetch failed: {exc}')
              result['earlyWarnings']['error'] = str(exc)

          data_path.write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          html_path = Path('weather-top-mockup.html')
          html = html_path.read_text(encoding='utf-8')
          if 'scripts/weather-live.js' not in html:
              html = html.replace('</body>', '<script src="scripts/weather-live.js?v=20260722-23"></script>\n</body>')
          else:
              html = re.sub(
                  r'scripts/weather-live\.js(?:\?v=[^"\']*)?',
                  'scripts/weather-live.js?v=20260722-23',
                  html,
              )
          html_path.write_text(html, encoding='utf-8')
          PY

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/weather-live.json weather-top-mockup.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update live weather data"
          git push
