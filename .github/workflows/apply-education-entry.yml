name: Apply education entry page

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-education-entry.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create education entry and update navigation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          education = '''<!doctype html>
          <html lang="ja">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="description" content="学校の位置と、公立小中学校の通学区域・徒歩ルートを確認するための入口です。">
            <title>教育｜にしかま周辺 まちノート</title>
            <link rel="stylesheet" href="machinote-theme.css">
          </head>
          <body data-mn-page="school" data-mn-base=".">
            <div data-machinote-header></div>
            <main class="mn-shell">
              <header class="mn-page-heading">
                <p>教育・子育て</p>
                <h1>教育</h1>
                <p class="mn-lead">学校の場所を探す地図と、公立小中学校の通学区域・徒歩ルートを確認する地図があります。</p>
              </header>
              <nav class="mn-subnav" aria-label="地域情報・地図の各ページ">
                <a href="regional-maps.html">案内</a>
                <a aria-current="page" href="education.html">教育</a>
                <a href="public-facilities.html">公共・文化・郵便</a>
                <a href="medical-welfare.html">医療・福祉</a>
                <a href="culture-history.html">文化・歴史</a>
                <a href="safety-map.html">消防・警察</a>
                <a href="population-outlook.html">人口</a>
                <a href="station-passengers.html">駅利用</a>
              </nav>
              <section class="mn-section">
                <div class="mn-section-title"><h2>目的から開く</h2></div>
                <div class="mn-card-grid">
                  <a class="mn-card" href="school-map-mockup.html"><img class="mn-card-icon" src="assets/icons/school.svg" alt=""><span><small>小学校・中学校・高校・大学等</small><strong>近隣・広域の学校地図</strong></span><span>›</span></a>
                  <a class="mn-card" href="school-districts.html"><img class="mn-card-icon" src="assets/icons/map.svg" alt=""><span><small>腰越・深沢・片瀬</small><strong>公立小中学校の学区・徒歩ルート</strong></span><span>›</span></a>
                </div>
              </section>
              <div class="mn-data-notes"><p>指定校や通学路は、各市教育委員会と学校の最新案内も確認してください。</p></div>
            </main>
            <footer class="mn-site-footer">© にしかま周辺 まちノート</footer>
            <script src="scripts/machinote-shell.js"></script>
          </body>
          </html>
          '''
          education = '\n'.join(line[10:] if line.startswith('          ') else line for line in education.splitlines()) + '\n'
          Path('education.html').write_text(education, encoding='utf-8')

          replace_once(
              'scripts/machinote-shell.js',
              "    ['school', href('mnSchool', 'school-districts.html'), '公立小中学校の学区']",
              "    ['school', href('mnSchool', 'education.html'), '教育']"
          )

          for path in [
              'public-facilities.html',
              'medical-welfare.html',
              'culture-history.html',
              'safety-map.html',
              'population-outlook.html',
              'station-passengers.html',
          ]:
              replace_once(
                  path,
                  '<a href="school-map-mockup.html">学校</a>',
                  '<a href="education.html">教育</a>'
              )

          replace_once(
              'regional-maps.html',
              '<a href="school-map-mockup.html">学校・幼稚園・保育施設</a>',
              '<a href="education.html">教育</a>'
          )
          replace_once(
              'regional-maps.html',
              '<a class="mn-card" href="school-map-mockup.html"><img class="mn-card-icon" src="assets/icons/school.svg" alt=""><span><small>教育・子育て</small><strong>学校・幼稚園・保育施設</strong></span><span>›</span></a>',
              '<a class="mn-card" href="education.html"><img class="mn-card-icon" src="assets/icons/school.svg" alt=""><span><small>教育・子育て</small><strong>教育</strong></span><span>›</span></a>'
          )
          replace_once(
              'regional-maps.html',
              '<a class="mn-card" href="school-districts.html"><img class="mn-card-icon" src="assets/icons/map.svg" alt=""><span><small>関連情報</small><strong>公立小中学校の学区</strong></span><span>›</span></a>\n',
              ''
          )
          replace_once(
              'school-map-mockup.html',
              '<body data-mn-page="maps" data-mn-base=".">',
              '<body data-mn-page="school" data-mn-base=".">'
          )
          PY

          node --check scripts/machinote-shell.js
          test -s education.html
          grep -F '<h1>教育</h1>' education.html
          grep -F 'href="school-map-mockup.html"' education.html
          grep -F 'href="school-districts.html"' education.html
          grep -F "href('mnSchool', 'education.html')" scripts/machinote-shell.js
          if grep -F 'href="school-map-mockup.html">学校</a>' public-facilities.html medical-welfare.html culture-history.html safety-map.html population-outlook.html station-passengers.html; then
            echo 'Old school subnav link remains' >&2
            exit 1
          fi
          if grep -F 'class="mn-card" href="school-districts.html"' regional-maps.html; then
            echo 'Separate school-district card remains on regional map entry' >&2
            exit 1
          fi
          git diff --check

      - name: Commit validated navigation change
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-education-entry.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add education.html scripts/machinote-shell.js regional-maps.html public-facilities.html medical-welfare.html culture-history.html safety-map.html population-outlook.html station-passengers.html school-map-mockup.html .github/workflows/apply-education-entry.yml
          git commit -m "Add education entry page"
          git push origin HEAD:main
