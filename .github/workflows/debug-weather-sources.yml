name: Debug weather sources

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-weather-sources.yml'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture source samples
        run: |
          python - <<'PY'
          import urllib.request
          from pathlib import Path
          sources = {
            'content/debug-wbgt.csv': 'http://www.wbgt.env.go.jp/prev15WG/dl/yohou_46141.csv',
            'content/debug-probability.json': 'https://www.jma.go.jp/bosai/probability/data/probability/140000.json'
          }
          for path, url in sources.items():
            req = urllib.request.Request(url, headers={'User-Agent':'nishikamakura-transit-guide/1.0'})
            with urllib.request.urlopen(req, timeout=30) as response:
              data = response.read()
            Path(path).write_bytes(data)
          PY
      - name: Commit samples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/debug-wbgt.csv content/debug-probability.json
          git commit -m "Capture weather source samples"
          git push
