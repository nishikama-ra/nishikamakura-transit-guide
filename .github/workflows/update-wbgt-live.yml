name: Reconcile daily WBGT

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-wbgt-live.yml'
  workflow_run:
    workflows:
      - 'Update live weather data'
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: reconcile-daily-wbgt-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  update:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Combine today's observations and remaining forecast
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import re
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          point = '46141'
          data_path = Path('content/weather-live.json')
          forecast_url = f'https://www.wbgt.env.go.jp/prev15WG/dl/yohou_{point}.csv'
          observed_url = f'https://www.wbgt.env.go.jp/est15WG/dl/wbgt_{point}_{now:%Y%m}.csv'

          def fetch_text(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      'User-Agent': 'nishikamakura-transit-guide/1.0',
                      'Cache-Control': 'no-cache',
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.read().decode('utf-8-sig', errors='replace')

          def finite_number(value, divisor=1.0):
              try:
                  value = float(str(value).strip()) / divisor
              except (TypeError, ValueError):
                  return None
              return value if value == value else None

          def parse_forecast(text):
              rows = list(csv.reader(io.StringIO(text)))
              if len(rows) < 2:
                  return {}, ''
              header = rows[0]
              station = next((row for row in rows[1:] if row and row[0].strip() == point), None)
              if station is None:
                  station = rows[1]
              created_at = station[1].strip() if len(station) > 1 else ''
              maxima = {}
              for stamp, raw in zip(header[2:], station[2:]):
                  digits = ''.join(ch for ch in stamp if ch.isdigit())
                  if len(digits) < 10:
                      continue
                  try:
                      dt = datetime.strptime(digits[:10], '%Y%m%d%H').replace(tzinfo=JST)
                  except ValueError:
                      continue
                  value = finite_number(raw, divisor=10.0)
                  if value is None:
                      continue
                  key = dt.date().isoformat()
                  maxima[key] = value if key not in maxima else max(maxima[key], value)
              return maxima, created_at

          def parse_observed(text):
              rows = list(csv.reader(io.StringIO(text)))
              header_index = next(
                  (i for i, row in enumerate(rows) if len(row) >= 3 and row[0].strip().lower() == 'date' and row[1].strip().lower() == 'time'),
                  None,
              )
              if header_index is None:
                  return None, ''
              header = rows[header_index]
              try:
                  value_index = next(i for i, cell in enumerate(header) if cell.strip() == point)
              except StopIteration:
                  value_index = 2
              maximum = None
              latest = None
              for row in rows[header_index + 1:]:
                  if len(row) <= value_index:
                      continue
                  try:
                      day = datetime.strptime(row[0].strip(), '%Y/%m/%d').date()
                      hour_text, minute_text = row[1].strip().split(':', 1)
                      hour = int(hour_text)
                      minute = int(minute_text)
                  except (ValueError, TypeError):
                      continue
                  if day != now.date():
                      continue
                  if hour == 24 and minute == 0:
                      observed_at = datetime.combine(day + timedelta(days=1), datetime.min.time(), tzinfo=JST)
                  elif 0 <= hour <= 23 and 0 <= minute <= 59:
                      observed_at = datetime(day.year, day.month, day.day, hour, minute, tzinfo=JST)
                  else:
                      continue
                  value = finite_number(row[value_index])
                  if value is None:
                      continue
                  maximum = value if maximum is None else max(maximum, value)
                  latest = observed_at if latest is None or observed_at > latest else latest
              return maximum, latest.isoformat(timespec='minutes') if latest else ''

          data = json.loads(data_path.read_text(encoding='utf-8'))
          forecast_maxima, forecast_created = parse_forecast(fetch_text(forecast_url))
          observed_max, observed_through = parse_observed(fetch_text(observed_url))

          labels = ['今日', '明日', '明後日']
          days = []
          for offset, label in enumerate(labels):
              day = (now + timedelta(days=offset)).date()
              key = day.isoformat()
              forecast_max = forecast_maxima.get(key)
              candidates = [forecast_max]
              if offset == 0:
                  candidates.append(observed_max)
              candidates = [value for value in candidates if value is not None]
              if not candidates:
                  continue
              item = {
                  'label': label,
                  'date': key,
                  'max': max(candidates),
                  'forecastMax': forecast_max,
              }
              if offset == 0:
                  item['observedMax'] = observed_max
                  item['observedThrough'] = observed_through
                  item['valueType'] = 'observed-or-forecast-maximum'
              else:
                  item['valueType'] = 'forecast-maximum'
              days.append(item)

          data['wbgt'] = {
              'status': 'ok' if days else 'error',
              'updatedAt': now.isoformat(timespec='minutes'),
              'forecastCreatedAt': forecast_created,
              'days': days,
          }
          data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          html_path = Path('weather-top-mockup.html')
          html = html_path.read_text(encoding='utf-8')
          html = re.sub(
              r'scripts/weather-live\.js(?:\?v=[^"\']*)?',
              'scripts/weather-live.js?v=20260722-24',
              html,
          )
          html_path.write_text(html, encoding='utf-8')
          PY

      - name: Commit generated WBGT data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/weather-live.json weather-top-mockup.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Reconcile daily WBGT maximum"
          git push
