<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>駅・バス停ごとの運行情報・公式時刻表｜西鎌倉周辺くらしの交通案内</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <header class="site-header"><a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span><span><small>西鎌倉周辺</small><strong>くらしの交通案内</strong></span></a><nav class="global-nav"><a href="index.html">ホーム</a><a aria-current="page" href="stops.html">駅・バス停から探す</a><a href="last-bus.html">終バス・終電</a></nav></header>
  <main>
    <section class="page-intro shell"><p class="eyebrow">駅・バス停一覧</p><h1>駅・バス停ごとの運行情報・公式時刻表</h1><p>バス停と駅を五十音順で掲載しています。停車する系統、藤沢・大船・鎌倉方面への平日の便数と最初・最後の便、各事業者の公式時刻表を確認できます。</p><p><a class="text-link" href="https://nishikama-ra.github.io/nishikama-transit-map/" target="_blank" rel="noopener">場所や周辺の高低差から探す場合は交通マップを見る ↗</a></p></section>
    <section class="section shell stops-section">
      <div class="stop-controls"><label>地域<select id="areaFilter"><option value="">すべて</option></select></label><label>駅・バス停名<input id="stopSearch" type="search" placeholder="名前を入力"></label></div>
      <p id="stopCount" class="place-count"></p><div id="stopList" class="stop-list"></div>
      <p class="status-note">便数と最初・最後の時刻は、2026年7月14日に保存した平日ダイヤの値です。運行日やダイヤ改正後の時刻は各事業者の公式時刻表で確認してください。藤沢・大船・鎌倉を出る最終便は「<a href="last-bus.html">終バス・終電</a>」で確認できます。</p>
    </section>
  </main>
  <script src="scripts/stops.js"></script>
</body></html>
