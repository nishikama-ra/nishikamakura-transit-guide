<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="西鎌倉周辺から学校・幼稚園・保育施設を地図で探すための操作可能なモックアップです。">
  <title>学校・幼稚園・保育施設｜にしかま周辺 まちノート</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="school-map-mockup.css">
  <link rel="stylesheet" href="school-map-recovery.css">
  <link rel="stylesheet" href="machinote-theme.css">
  <link rel="stylesheet" href="existing-pages-theme.css">
</head>
<body data-mn-page="maps" data-mn-base=".">
  <div data-machinote-header></div>

  <main class="school-shell">
    <header class="school-page-heading">
      <p>教育・子育て</p>
      <h1>学校・幼稚園・保育施設</h1>
    </header>

    <section class="school-filter-panel" aria-labelledby="filter-heading">
      <div class="school-filter-title">
        <h2 id="filter-heading">絞り込み</h2>
        <button id="resetFilters" type="button">すべての施設種類を表示</button>
      </div>
      <div class="school-filter-groups">
        <fieldset class="school-filter-group school-scope-filter">
          <legend>表示範囲</legend>
          <div class="school-segmented" id="scopeFilters">
            <button type="button" data-scope="local" aria-pressed="true">地域</button>
            <button type="button" data-scope="nearby" aria-pressed="false">周辺</button>
            <button type="button" data-scope="wide" aria-pressed="false">広域</button>
          </div>
        </fieldset>
        <fieldset class="school-filter-group school-type-filter">
          <legend>施設種類（複数選択）</legend>
          <div class="school-filter-scroll" id="typeFilters"></div>
        </fieldset>
        <fieldset class="school-filter-group school-ownership-filter">
          <legend>設置区分</legend>
          <div class="school-segmented" id="ownershipFilters">
            <button type="button" data-ownership="all" aria-pressed="true">すべて</button>
            <button type="button" data-ownership="public" aria-pressed="false">国公立</button>
            <button type="button" data-ownership="private" aria-pressed="false">私立</button>
          </div>
        </fieldset>
      </div>
    </section>

    <section class="school-map-section" aria-labelledby="map-heading">
      <div class="school-map-heading">
        <div>
          <h2 id="map-heading">地図で見る</h2>
        </div>
        <div class="school-route-tools" aria-label="公共交通経路の出発地設定">
          <button id="selectRouteOrigin" type="button" aria-pressed="false">出発地を地図で指定</button>
          <button id="clearRouteOrigin" type="button" hidden>出発地を解除</button>
          <span id="routeOriginStatus">出発地未指定（Googleマップ側でも指定できます）</span>
        </div>
      </div>
      <div class="school-map-layout">
        <div class="school-map-wrap">
          <div id="schoolMapMockup" class="school-map" aria-label="学校・幼稚園・保育施設の地図"></div>
        </div>
        <aside class="school-list-panel" aria-label="現在表示している施設">
          <div class="school-list-heading">
            <h3>表示中の施設</h3>
            <span id="schoolCount"></span>
          </div>
          <div id="schoolList" class="school-list"></div>
        </aside>
      </div>
    </section>

    <aside class="school-related-link">
      <span><small>関連情報</small><strong>公立小中学校の学区を調べる</strong></span>
      <a href="school-districts.html">開く <span aria-hidden="true">→</span></a>
    </aside>
  </main>

  <script src="scripts/machinote-shell.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="scripts/school-map-mockup.js"></script>
</body>
</html>
