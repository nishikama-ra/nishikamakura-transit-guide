<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="腰越・深沢・片瀬周辺の学校、幼稚園、保育施設を地図で確認できます。">
  <title>近隣の学校・幼稚園・保育施設｜にしかま周辺 まちノート</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="school-map-mockup.css">
  <link rel="stylesheet" href="machinote-theme.css">
  <link rel="stylesheet" href="existing-pages-theme.css">
  <style>
    .nearby-education-page .school-filter-groups { grid-template-columns: minmax(0, 1fr) auto; }
    .school-page-heading .school-page-lead { margin: 8px 0 0; color: var(--muted); font-size: 13px; letter-spacing: 0; }
  </style>
</head>
<body class="nearby-education-page" data-mn-page="school" data-mn-base=".">
  <div data-machinote-header></div>
  <main class="school-shell">
    <header class="school-page-heading">
      <p>教育・子育て</p>
      <h1>近隣の学校・幼稚園・保育施設</h1>
      <p class="school-page-lead">腰越・深沢・片瀬周辺の公立小中学校、私立学校、幼稚園、保育施設などを表示します。</p>
    </header>

    <nav class="mn-subnav" aria-label="教育の各ページ">
      <a href="education.html">教育案内</a>
      <a aria-current="page" href="education-nearby.html">近隣施設</a>
      <a href="school-districts.html">公立小中学校の学区</a>
      <a href="school-map-mockup.html">広域の学校</a>
    </nav>

    <section class="school-filter-panel" aria-labelledby="nearby-filter-heading">
      <div class="school-filter-title">
        <h2 id="nearby-filter-heading">絞り込み</h2>
        <button id="resetFilters" type="button">すべての施設種類を表示</button>
      </div>
      <div class="school-filter-groups">
        <fieldset class="school-filter-group school-type-filter">
          <legend>施設種類（複数選択）</legend>
          <div class="school-filter-scroll" id="typeFilters"></div>
        </fieldset>
        <fieldset class="school-filter-group school-ownership-filter">
          <legend>設置区分</legend>
          <div class="school-segmented" id="ownershipFilters">
            <button type="button" data-ownership="all" aria-pressed="true">すべて</button>
            <button type="button" data-ownership="public" aria-pressed="false">国公立</button>
            <button type="button" data-ownership="private" aria-pressed="false">私立</button>
          </div>
        </fieldset>
      </div>
    </section>

    <section class="school-map-section" aria-labelledby="nearby-map-heading">
      <div class="school-map-heading"><div><h2 id="nearby-map-heading">地図で見る</h2></div></div>
      <div class="school-map-layout">
        <div class="school-map-wrap">
          <div id="nearbyEducationMap" class="school-map" aria-label="近隣の学校・幼稚園・保育施設の地図"></div>
        </div>
        <aside class="school-list-panel" aria-label="現在表示している施設">
          <div class="school-list-heading"><h3>表示中の施設</h3><span id="schoolCount"></span></div>
          <div id="schoolList" class="school-list"></div>
        </aside>
      </div>
    </section>

    <div class="mn-data-notes">
      <p>掲載情報は2026年7月時点です。幼稚園・保育施設は各自治体の施設一覧、学校は国土数値情報と各校の公式情報を基にしています。</p>
    </div>
  </main>
  <footer class="mn-site-footer">© にしかま周辺 まちノート</footer>
  <script src="scripts/machinote-shell.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="scripts/education-nearby.js"></script>
</body>
</html>
